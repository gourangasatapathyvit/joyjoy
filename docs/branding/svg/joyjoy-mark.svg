<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="400" height="440">
  <defs>
    <linearGradient id="head-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF3D81"/>
      <stop offset="33%"  stop-color="#A855D6"/>
      <stop offset="66%"  stop-color="#3A7BD5"/>
      <stop offset="100%" stop-color="#3DB665"/>
    </linearGradient>
    <radialGradient id="led-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFAE5"/>
      <stop offset="40%"  stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </radialGradient>
    <radialGradient id="led-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFD93D" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chest" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF3D81"/>
      <stop offset="50%"  stop-color="#A855D6"/>
      <stop offset="100%" stop-color="#3A7BD5"/>
    </linearGradient>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- LED halo (the "thinking" glow) -->
  <circle cx="200" cy="42" r="34" fill="url(#led-halo)"/>

  <!-- Antenna -->
  <line x1="200" y1="95" x2="200" y2="55" stroke="#A855D6" stroke-width="8" stroke-linecap="round"/>
  <circle cx="200" cy="42" r="13" fill="url(#led-glow)" stroke="#FF8C42" stroke-width="2"/>
  <circle cx="196" cy="38" r="3.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Head -->
  <g filter="url(#soft-shadow)">
    <rect x="60" y="100" width="280" height="260" rx="54" ry="54"
          fill="#FFFFFF" stroke="url(#head-border)" stroke-width="10"/>
  </g>

  <!-- Side "bolts" -->
  <circle cx="60"  cy="220" r="9" fill="#A855D6"/>
  <circle cx="340" cy="220" r="9" fill="#A855D6"/>
  <circle cx="60"  cy="220" r="3" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="340" cy="220" r="3" fill="#FFFFFF" opacity="0.7"/>

  <!-- Eyes (jj pair: pink + blue) -->
  <circle cx="152" cy="208" r="38" fill="#FF3D81"/>
  <circle cx="248" cy="208" r="38" fill="#3A7BD5"/>
  <!-- eye highlights -->
  <circle cx="140" cy="196" r="11" fill="#FFFFFF"/>
  <circle cx="236" cy="196" r="11" fill="#FFFFFF"/>
  <circle cx="162" cy="220" r="5"  fill="#FFFFFF" opacity="0.85"/>
  <circle cx="258" cy="220" r="5"  fill="#FFFFFF" opacity="0.85"/>

  <!-- Cheek blush -->
  <ellipse cx="108" cy="270" rx="16" ry="9" fill="#FFB8D4" opacity="0.75"/>
  <ellipse cx="292" cy="270" rx="16" ry="9" fill="#FFB8D4" opacity="0.75"/>

  <!-- Smile -->
  <path d="M160 295 Q200 325 240 295"
        stroke="#FF6B1A" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Chest panel hint -->
  <rect x="158" y="370" width="84" height="22" rx="8" fill="url(#chest)" opacity="0.85"/>
  <circle cx="178" cy="381" r="3.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="200" cy="381" r="3.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="222" cy="381" r="3.5" fill="#FFFFFF" opacity="0.9"/>
</svg>
