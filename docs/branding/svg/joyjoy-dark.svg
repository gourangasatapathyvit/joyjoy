    <rect x="158" y="370" width="84" height="22" rx="8" fill="url(#chest)" opacity="0.9"/>
    <circle cx="178" cy="381" r="3.5" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="200" cy="381" r="3.5" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="222" cy="381" r="3.5" fill="#FFFFFF" opacity="0.95"/>
  </g>

  <g font-family="'Comic Sans MS','Baloo 2','Quicksand','Trebuchet MS',sans-serif"
     font-weight="900" font-size="180">
    <text x="520"  y="305" fill="url(#grad-j1)">j</text>
    <text x="610"  y="305" fill="url(#grad-o1)">o</text>
    <text x="725"  y="305" fill="url(#grad-y1)">y</text>
    <text x="840"  y="305" fill="url(#grad-j2)">j</text>
    <text x="930"  y="305" fill="url(#grad-o2)">o</text>
    <text x="1045" y="305" fill="url(#grad-y2)">y</text>
  </g>
</svg>
