# joyjoy — self-contained stack: Postgres + the single FastAPI app (serves the
# React SPA and the /v1 API on :8080; all app data is relational, prod = Postgres).
#
#   1. set the required secrets in .env (compose reads it for ${VAR} interpolation):
#        JWT_SECRET, CREDENTIAL_ENCRYPTION_KEY   (generate-once; keep stable!)
#        AZURE_OPENAI_API_KEY                     (base-model key; the seed refs ${AZURE_OPENAI_API_KEY})
#   2. docker compose up --build
#   3. open http://localhost:8080  → sign up / log in
#
# On first boot the app creates the schema and loads backend/app/db/seeds/global_seed.sql
# into the empty DB (skins, providers, base models, MCP, skills). No secret is in the
# SQL — model keys are ${AZURE_OPENAI_API_KEY} env-refs resolved at runtime.

services:
  # ---- Optional bundled Postgres for LOCAL dev (DB_HOSTER=0) ----
  # Gated behind the `localdb` profile: it ONLY starts when COMPOSE_PROFILES includes
  # `localdb`. For server-hosted Postgres (DB_HOSTER=1 / prod) leave that profile unset
  # and point DATABASE_URL at your server. There is intentionally NO `depends_on` from
  # backend → db (a depends_on would force this to start even in server mode); in local
  # mode the backend just retries via `restart: unless-stopped` until Postgres is ready.
  db:
    profiles: ["localdb"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-joyjoy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-joyjoy}
      POSTGRES_DB: ${POSTGRES_DB:-joyjoy_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-joyjoy} -d ${POSTGRES_DB:-joyjoy_db}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: prod
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      # Generate-once secrets — MUST be set and STABLE in prod (rotating
      # CREDENTIAL_ENCRYPTION_KEY orphans every stored encrypted secret).
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?set CREDENTIAL_ENCRYPTION_KEY in .env}
      # Base/global model API key — the seeded models reference ${AZURE_OPENAI_API_KEY}.
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      # Agent workspace files (the ONLY on-disk state in prod). The sessions table
      # stores a RELATIVE workspace_path; this root resolves it — point it at a shared
      # mount for multi-node. (SQLITE_CHECKPOINT_PATH/APP_DB_PATH are dev-only and
      # unused in prod — and must NOT live on a network FS: SQLite locking corrupts.)
      # Literal (NOT ${WORKSPACE_ROOT}) so the dev .env's absolute path can't leak in —
      # this must be the in-container mount path below. Change both together to relocate.
      WORKSPACE_ROOT: /data
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "8080"
      # ---- Agent sandbox (code/shell execution) — OFF by default ----
      # false → host workspace mode (agent files on the /data volume above).
      # true  → per-session OpenSandbox containers via the `opensandbox` service.
      # To turn ON: set SANDBOX_ENABLED=true AND COMPOSE_PROFILES=sandbox in .env
      # (the profile starts the server + builds the sandbox image). The backend talks
      # to the server by its compose service name; nothing else changes.
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-false}
      SANDBOX_SERVER_DOMAIN: ${SANDBOX_SERVER_DOMAIN:-opensandbox:8090}
      SANDBOX_SERVER_PROTOCOL: ${SANDBOX_SERVER_PROTOCOL:-http}
      # MUST be true in compose: sandboxes are spawned as host-bridge siblings the
      # backend container can't reach directly — proxy their traffic through the
      # server (opensandbox:8090). Direct mode here = 30s health-check timeouts +
      # endless retries ("workspace spinning up only" + slow). Host/dev keeps false.
      SANDBOX_USE_SERVER_PROXY: ${SANDBOX_USE_SERVER_PROXY:-true}
      OPENSANDBOX_API_KEY: ${OPENSANDBOX_API_KEY:-}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-joyjoy/sandbox-fat:4}
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      # Named volume by default. For a REMOTE/shared mount (NFS/EFS/SMB/object-FUSE),
      # replace this with a bind/driver-mounted path at /data, e.g.:
      #   - type: volume
      #     source: nfs-workspaces   # defined under top-level `volumes:` with driver_opts
      #     target: /data
      - workspaces:/data    # → WORKSPACE_ROOT
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ---- Optional: the jira MCP server (mcp-atlassian) on the same network ----
  # The seeded global "jira" MCP points at http://localhost:9000/mcp; in containers
  # update that global_mcps row to http://jira-mcp:9000/mcp, then enable this:
  # jira-mcp:
  #   image: ghcr.io/sooperset/mcp-atlassian:latest
  #   restart: unless-stopped
  #   command: ["--transport", "streamable-http", "--port", "9000", "--host", "0.0.0.0", "--stateless"]
  #   env_file: [mcp-atlassian.env]   # JIRA_URL / JIRA_USERNAME / JIRA_API_TOKEN, etc.

  # ──────────────────────────────────────────────────────────────────────────
  # Sandbox execution layer — OPT-IN. Enable with:  COMPOSE_PROFILES=sandbox
  # (and SANDBOX_ENABLED=true on the backend). Without the profile, none of this
  # runs and the app uses host workspace mode. NOTE: this is a starting scaffold —
  # the OpenSandbox-in-a-container networking below needs validating for your host
  # (the proven dev path runs the server on the host via scripts/start_all.sh).
  # ──────────────────────────────────────────────────────────────────────────

  # Build-only: bakes joyjoy/sandbox-fat into the HOST Docker daemon so the server
  # can spawn per-session sandboxes from it. Runs once and exits (not a service).
  sandbox-image:
    profiles: ["sandbox"]
    build:
      context: ./sandbox-image
    image: ${SANDBOX_IMAGE:-joyjoy/sandbox-fat:4}
    command: ["true"]
    restart: "no"

  # The OpenSandbox server: spawns the per-session sandbox CONTAINERS as SIBLINGS on
  # the host daemon (via the mounted docker.sock) and proxies the backend's file/exec
  # calls to them. SECURITY: mounting docker.sock = host-level container control; this
  # is the privileged agent-execution tier — isolate/network-restrict it.
  # REQUIRED for cross-container reach: set `[server] host = "0.0.0.0"` in sandbox.toml
  # (the committed file uses 127.0.0.1, which only works when server+backend share a
  # host as in dev) so the backend container can reach opensandbox:8090 and its proxy
  # ports. Also set OPENSANDBOX_API_KEY in .env to match the toml's api_key.
  opensandbox:
    profiles: ["sandbox"]
    image: python:3.13-slim
    restart: unless-stopped
    depends_on:
      sandbox-image:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./sandbox.toml:/app/sandbox.toml:ro
      - opensandbox-state:/root/.opensandbox
    environment:
      # Non-interactive ack if you run with an empty api_key (prefer a real key instead).
      OPENSANDBOX_INSECURE_SERVER: ${OPENSANDBOX_INSECURE_SERVER:-}
    # exec-array form, NOT `command: >`. A folded block scalar keeps the newline before a
    # more-indented continuation line, so `&&` lands at the start of its own line →
    # "sh: Syntax error: && unexpected" and the server never starts. One line, no folding.
    command: ["sh", "-c", "pip install --no-cache-dir uv && uvx --from opensandbox-server opensandbox-server --config /app/sandbox.toml"]

networks:
  # Pin the default network to a FIXED name (not the implicit "<project>_default",
  # which changes with the directory/COMPOSE_PROJECT_NAME). The OpenSandbox server
  # spawns per-session sandbox containers onto this network by name (sandbox.toml →
  # [docker] network_mode), so it must be stable + portable. Keep the two in sync.
  default:
    name: joyjoy-net

volumes:
  pgdata:            # used only by the `db` service (localdb profile / DB_HOSTER=0)
  workspaces:
  opensandbox-state:
