<!-- Simplified mascot optimized for tiny sizes (16x16, 32x32). 
     Drops cheeks, side-bolts, chest panel, gradient strokes, highlights. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Antenna -->
  <line x1="32" y1="14" x2="32" y2="6" stroke="#A855D6" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="5" r="3.5" fill="#FFD93D" stroke="#FF8C42" stroke-width="0.8"/>

  <!-- Head -->
  <rect x="8" y="14" width="48" height="42" rx="11" ry="11"
        fill="#FFFFFF" stroke="#A855D6" stroke-width="3"/>

  <!-- Eyes -->
  <circle cx="23" cy="32" r="6" fill="#FF3D81"/>
  <circle cx="41" cy="32" r="6" fill="#3A7BD5"/>

  <!-- Smile -->
  <path d="M24 44 Q32 49 40 44"
        stroke="#FF6B1A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
